# Builds an installable Linux bundle of the kakoune-mode fork against Zed's
# PREVIEW release line, and publishes it as a Release on the fork.
#
# The model is "true preview release + kakoune", not "rolling main":
#   - `kakoune-mode` holds the kakoune commits, developed against main and
#     kept rebased there by sync-upstream.yml (so it always compiles vs main).
#   - Each upstream PREVIEW tag (`vX.Y.Z-pre`) is a point on Zed's release
#     branch, which lags main by ~a week plus a few release-only commits.
#   - This workflow replays the kakoune commits onto that preview tag and
#     builds the result, so the artifact is genuinely preview code + kakoune.
#
# Preview lags main only slightly, so the replay almost always applies and
# compiles cleanly. When it doesn't, the job alerts and publishes nothing:
#   - rebase conflict  -> a touched file diverged; resolve the conflict
#   - build failure    -> an API the kakoune code uses drifted; patch it
# Both are the "fix-forward" cases you accepted by targeting a real release.
#
# Like the sync workflow, this must live on the fork's DEFAULT branch (main)
# so the `schedule` trigger fires.
name: Build fork release

on:
  schedule:
    # Poll daily for a new preview tag. The check job dedups, so this only
    # actually builds when upstream cuts a preview you haven't built yet
    # (roughly twice a week), not every day.
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Build even if a release already exists for the latest preview tag"
        type: boolean
        default: false

concurrency:
  group: build-fork-release
  cancel-in-progress: false

permissions:
  contents: write # create the fork release + push the replayed build ref
  issues: write # alert if the rebase or build fails

env:
  WORK_BRANCH: kakoune-mode
  UPSTREAM: https://github.com/zed-industries/zed.git
  # The replayed commit (kakoune on top of the preview tag) is pushed here so
  # the release tag and the nix-cache job can both reach it.
  BUILD_BRANCH: preview-build

jobs:
  # Cheap job: is there a new upstream PREVIEW release we haven't built yet?
  check:
    if: github.repository_owner != 'zed-industries'
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      upstream_tag: ${{ steps.decide.outputs.upstream_tag }}
      release_tag: ${{ steps.decide.outputs.release_tag }}
    steps:
      - id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Newest prerelease tag. The releases list is newest-first, and
          # `releases/latest` would give the STABLE line, so filter explicitly.
          upstream_tag=$(gh api 'repos/zed-industries/zed/releases?per_page=30' \
            --jq '[.[] | select(.prerelease)] | .[0].tag_name')
          if [ -z "$upstream_tag" ] || [ "$upstream_tag" = "null" ]; then
            echo "Could not determine the latest preview tag." >&2
            exit 1
          fi
          release_tag="kakoune-${upstream_tag}"
          echo "upstream_tag=$upstream_tag" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Forced build requested."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $release_tag already exists; nothing to do."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "No fork release for $upstream_tag yet; will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    # Release builds on the free 4-core runner are slow; give them headroom.
    timeout-minutes: 350
    env:
      UPSTREAM_TAG: ${{ needs.check.outputs.upstream_tag }}
      RELEASE_TAG: ${{ needs.check.outputs.release_tag }}
    steps:
      - name: Checkout work branch
        uses: actions/checkout@v5
        with:
          ref: ${{ env.WORK_BRANCH }}
          # Full history so we can rebase the kakoune commits onto the tag.
          fetch-depth: 0
          # PAT with `repo` + `workflow` scopes: pushing the replayed build
          # ref carries upstream's workflow files, which GITHUB_TOKEN may not.
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Replay kakoune commits onto the preview tag
        id: replay
        run: |
          set -euo pipefail
          git remote add upstream "$UPSTREAM"
          git fetch --no-tags upstream main
          git fetch --no-tags upstream "refs/tags/${UPSTREAM_TAG}:refs/tags/${UPSTREAM_TAG}"
          # The fork point of the kakoune work on main: everything after it on
          # WORK_BRANCH is the kakoune commits, regardless of how far main moved.
          base=$(git merge-base upstream/main "$WORK_BRANCH")
          git checkout -B "$BUILD_BRANCH" "$WORK_BRANCH"
          # --committer-date-is-author-date makes the replayed commit SHAs
          # deterministic across re-runs (committer date would otherwise be
          # "now"). The zed nix package bakes the git short-rev into its
          # name (zed-editor-...-nightly+<rev>), so a churning SHA would
          # change the store path every run and miss the attic cache.
          if git rebase --committer-date-is-author-date --onto "$UPSTREAM_TAG" "$base"; then
            echo "result=ok" >> "$GITHUB_OUTPUT"
          else
            git rebase --abort || true
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

      - name: Install system dependencies
        run: ./script/linux

      - name: Download WASI SDK
        run: ./script/download-wasi-sdk

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: bundle-linux
          cache-on-failure: true

      - name: Force a coexisting channel
        # Build as the `dev` channel so the artifact installs alongside an
        # official Zed and is never touched by Zed's auto-updater.
        run: echo dev > crates/zed/RELEASE_CHANNEL

      - name: Bundle Linux release
        env:
          CC: clang
          CXX: clang++
          # Build remote_server against glibc instead of the default musl
          # target. ubuntu-latest (24.04) ships glibc 2.39, whose
          # `__isoc23_*` symbols aren't satisfiable when statically linking
          # the musl remote_server, so the musl link fails. A glibc
          # remote_server is fine for a personal build.
          REMOTE_SERVER_TARGET: x86_64-unknown-linux-gnu
        run: ./script/bundle-linux

      - name: Publish fork release
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          set -euo pipefail
          arch=$(uname -m)
          # Push the replayed commit so the release tag (and the nix-cache job)
          # can point at it. The tag is created at this commit by gh below.
          git push --force origin "$BUILD_BRANCH"
          cat > release-notes.md <<EOF
          Installable Linux and macOS builds of the kakoune-mode fork.

          Built from upstream preview **${UPSTREAM_TAG}** with the kakoune-mode
          commits replayed on top. This tracks Zed's preview line, so it is a
          real upstream release plus kakoune mode, not a main snapshot. Built as
          the \`dev\` channel so it installs alongside an official Zed.

          **Linux:** download \`zed-linux-${arch}.tar.gz\`, extract it, and run the
          \`zed\` binary inside.

          **macOS (Apple Silicon):** download \`Zed-aarch64.dmg\` and drag Zed to
          Applications. The build is unsigned, so clear the quarantine flag once:
          \`xattr -dr com.apple.quarantine /Applications/Zed.app\` (or right-click
          the app and choose Open). The macOS DMG is attached by a separate job a
          few minutes after this release first appears.
          EOF
          # Idempotent: a forced rebuild replaces the existing release and
          # re-points its tag at the freshly replayed commit instead of failing.
          gh release delete "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --cleanup-tag --yes 2>/dev/null || true
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$BUILD_BRANCH" \
            --prerelease \
            --title "Kakoune Zed (${UPSTREAM_TAG})" \
            --notes-file release-notes.md \
            "target/release/zed-linux-${arch}.tar.gz" \
            "target/zed-remote-server-linux-${arch}.gz"

      - name: Alert on rebase conflict or build failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const conflict = '${{ steps.replay.outputs.result }}' === 'conflict';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const tag = process.env.UPSTREAM_TAG;
            const title = conflict
              ? `Preview replay conflicts for ${tag}`
              : `Preview build failed for ${tag}`;
            const body = conflict
              ? [
                  `Replaying the kakoune commits onto preview \`${tag}\` hit conflicts, so nothing was published. A file the kakoune work touches diverged on the release branch.`,
                  '',
                  'Resolve locally, then re-run this workflow (or fix on `kakoune-mode`):',
                  '',
                  '```',
                  'git fetch upstream main "refs/tags/' + tag + ':refs/tags/' + tag + '"',
                  'git switch -c preview-build kakoune-mode',
                  'git rebase --onto ' + tag + ' $(git merge-base upstream/main kakoune-mode)',
                  '# resolve, then build to verify:',
                  'cargo test -p vim && cargo build -p zed -p settings_ui',
                  '```',
                  '',
                  `Run: ${runUrl}`,
                ].join('\n')
              : [
                  `The kakoune commits replayed cleanly onto preview \`${tag}\`, but the build failed, so nothing was published. An API the kakoune code depends on likely drifted between main and this preview.`,
                  '',
                  'Reproduce and patch the kakoune code against the older preview API:',
                  '',
                  '```',
                  'git fetch upstream main "refs/tags/' + tag + ':refs/tags/' + tag + '"',
                  'git switch -c preview-build kakoune-mode',
                  'git rebase --onto ' + tag + ' $(git merge-base upstream/main kakoune-mode)',
                  'cargo build -p zed -p settings_ui',
                  '```',
                  '',
                  `Run (full logs): ${runUrl}`,
                ].join('\n');
            const label = 'fork-release-build';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: label,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body: `### ${title}\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: [label],
              });
            }

  # Build an Apple Silicon (arm64) macOS bundle and attach it to the release
  # the `build` job already created. The `build` job has, by the time this
  # runs, replayed the kakoune commits onto the preview tag, pushed the result
  # to `preview-build`, and published the release; this job just checks out
  # that exact commit and adds the .dmg.
  #
  # The build is UNSIGNED: with no Apple secrets present, `script/bundle-mac`
  # ad-hoc signs the app and strips the universal-links entitlement. Gatekeeper
  # will quarantine it, so on first launch the user clears it once with
  # `xattr -dr com.apple.quarantine /Applications/Zed.app` (or right-click >
  # Open). Auto-update is already neutralized by the `dev` channel.
  build-macos:
    needs: [check, build]
    if: needs.check.outputs.should_build == 'true'
    # macos-15 (standard, free on public repos) defaults to Xcode 16.x, whose
    # Apple libc++ satisfies the C++20 contiguous_iterator concept that the
    # pinned cxx in webrtc-sys requires. The older macos-14 Xcode 15.x libc++
    # fails it (static_assert(contiguous_range<rust::Slice<...>>) in cxx.h).
    runs-on: macos-15
    # Cold builds on the free 3-core runner are slow; give them the full
    # GitHub-hosted ceiling (6h hard cap) so the first cold build can finish
    # and its post-step saves the rust-cache for fast subsequent runs.
    timeout-minutes: 350
    env:
      RELEASE_TAG: ${{ needs.check.outputs.release_tag }}
    steps:
      - name: Checkout the replayed build commit
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BUILD_BRANCH }}
          fetch-depth: 1

      - name: Set up Node
        # script/bundle-mac shells out to `dmg-license` (npm) for the DMG.
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Force a coexisting channel
        run: echo dev > crates/zed/RELEASE_CHANNEL

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: bundle-mac
          cache-on-failure: true

      - name: Bundle macOS release (arm64, unsigned)
        # No Apple secrets in env -> the script falls back to ad-hoc signing.
        run: ./script/bundle-mac aarch64-apple-darwin

      - name: Attach the DMG to the release
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "target/aarch64-apple-darwin/release/Zed-aarch64.dmg" \
            --repo "$GITHUB_REPOSITORY" --clobber

  # Build the flake's nix package from the exact commit the release tag points
  # at (preview + kakoune) and push it to the self-hosted attic cache on
  # najdorf over Tailscale, so the NixOS machines substitute it instead of
  # compiling locally.
  nix-cache:
    needs: [check, build]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      # The attic cache's Tailscale Service endpoint (reachable once the
      # runner has joined the tailnet below).
      ATTIC_ENDPOINT: https://attic.taila5f2.ts.net
    steps:
      - name: Checkout the release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.check.outputs.release_tag }}
          fetch-depth: 1

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          # Let the zed flake's own substituters (its cachix) serve the
          # vendored dependencies so only the fork's code compiles.
          extra-conf: |
            accept-flake-config = true

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          # OAuth client (Tailscale admin > Settings > OAuth clients) with the
          # `auth_keys` write scope and the `tag:ci` tag. Unlike auth keys
          # (90-day max), OAuth clients don't expire, so nothing to rotate; the
          # action mints a short-lived ephemeral key per run. `tag:ci` must
          # be declared in tagOwners and granted reach to the cache Service.
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: gha-zed-nixcache
          # The action's default tailscale is too old (1.42.0) to route to a
          # Tailscale Service VIP (svc:attic) — that feature needs ~1.74+.
          # Pin a modern client or the push silently times out on connect.
          version: 1.98.4

      - name: Build the nix package
        run: nix build .#default --no-link --print-out-paths > out-paths.txt

      - name: Push to najdorf's attic cache
        env:
          # Scoped, push-only token minted on najdorf with
          # `atticd-atticadm make-token --push main --pull main ...`.
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          # The cache is a tailnet-only Tailscale Service; the Tailscale step
          # above gives the runner reach to it over HTTPS.
          nix profile install nixpkgs#attic-client
          attic login najdorf "$ATTIC_ENDPOINT" "$ATTIC_TOKEN"
          xargs -r attic push najdorf:main < out-paths.txt
