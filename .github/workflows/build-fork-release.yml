# Builds an installable Linux bundle of the kakoune-mode fork whenever upstream
# publishes a new release, and publishes it as a Release on the fork.
#
# This is a ROLLING build: it bundles `kakoune-mode-v2` as it currently stands
# (upstream main + kakoune mode), using each upstream release only as the build
# cadence and version label. It always compiles, because it's exactly the
# branch you develop and test against. It is NOT "upstream stable + kakoune" —
# that was tried and fails to compile whenever main and the stable release
# differ on an API the kakoune code touches.
#
# Like the sync workflow, this must live on the fork's DEFAULT branch (main)
# so the `schedule` trigger fires.
name: Build fork release

on:
  schedule:
    # Check once a day for a new upstream release.
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Build even if a release already exists for the latest upstream tag"
        type: boolean
        default: false

concurrency:
  group: build-fork-release
  cancel-in-progress: false

permissions:
  contents: write # create the fork release
  issues: write # alert if the build fails

env:
  WORK_BRANCH: kakoune-mode-v2

jobs:
  # Cheap job: is there a new upstream release we haven't built yet?
  check:
    if: github.repository_owner != 'zed-industries'
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      upstream_tag: ${{ steps.decide.outputs.upstream_tag }}
      release_tag: ${{ steps.decide.outputs.release_tag }}
    steps:
      - id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          upstream_tag=$(gh api repos/zed-industries/zed/releases/latest --jq .tag_name)
          release_tag="kakoune-${upstream_tag}"
          echo "upstream_tag=$upstream_tag" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Forced build requested."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $release_tag already exists; nothing to do."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "No fork release for $upstream_tag yet; will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    # Release builds on the free 4-core runner are slow; give them headroom.
    timeout-minutes: 350
    env:
      UPSTREAM_TAG: ${{ needs.check.outputs.upstream_tag }}
      RELEASE_TAG: ${{ needs.check.outputs.release_tag }}
    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.WORK_BRANCH }}
          fetch-depth: 1

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

      - name: Install system dependencies
        run: ./script/linux

      - name: Download WASI SDK
        run: ./script/download-wasi-sdk

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: bundle-linux
          cache-on-failure: true

      - name: Force a coexisting channel
        # Build as the `dev` channel so the artifact installs alongside an
        # official Zed and is never touched by Zed's auto-updater.
        run: echo dev > crates/zed/RELEASE_CHANNEL

      - name: Bundle Linux release
        env:
          CC: clang
          CXX: clang++
          # Build remote_server against glibc instead of the default musl
          # target. ubuntu-latest (24.04) ships glibc 2.39, whose
          # `__isoc23_*` symbols aren't satisfiable when statically linking
          # the musl remote_server, so the musl link fails. A glibc
          # remote_server is fine for a personal build.
          REMOTE_SERVER_TARGET: x86_64-unknown-linux-gnu
        run: ./script/bundle-linux

      - name: Publish fork release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          arch=$(uname -m)
          cat > release-notes.md <<EOF
          Installable Linux build of the kakoune-mode fork.

          Built from \`${WORK_BRANCH}\` (upstream main + kakoune mode) at the time
          upstream published **${UPSTREAM_TAG}**. This tracks main, not the
          upstream stable line, so treat it as a rolling build. Built as the
          \`dev\` channel so it installs alongside an official Zed.

          To install: download \`zed-linux-${arch}.tar.gz\`, extract it, and run the
          \`zed\` binary inside.
          EOF
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$WORK_BRANCH" \
            --title "Kakoune Zed (${UPSTREAM_TAG})" \
            --notes-file release-notes.md \
            "target/release/zed-linux-${arch}.tar.gz" \
            "target/zed-remote-server-linux-${arch}.gz"

      - name: Alert on build failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const tag = process.env.UPSTREAM_TAG;
            const title = `Fork release build failed for ${tag}`;
            const body = [
              `Building \`${process.env.WORK_BRANCH}\` for upstream ${tag} failed, so no artifact was published.`,
              '',
              'A rolling build normally always compiles, so this usually means a recent upstream main change broke the build before the daily sync caught it. Check the run logs.',
              '',
              `Run: ${runUrl}`,
            ].join('\n');
            const label = 'fork-release-build';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: label,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body: `### ${title}\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: [label],
              });
            }

  # Build the flake's nix package and push it to the self-hosted binary cache
  # on najdorf (over Tailscale), so the NixOS machines substitute it instead of
  # compiling locally. Runs after `build` so it builds the exact commit the
  # release tag points to, which is what you pin the flake input to.
  nix-cache:
    needs: [check, build]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      # The attic cache's Tailscale Service endpoint (reachable once the
      # runner has joined the tailnet below).
      ATTIC_ENDPOINT: https://attic.taila5f2.ts.net
    steps:
      - name: Checkout the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.release_tag }}
          fetch-depth: 1

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          # Let the zed flake's own substituters (its cachix) serve the
          # vendored dependencies so only the fork's code compiles.
          extra-conf: |
            accept-flake-config = true

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          # OAuth client (Tailscale admin > Settings > OAuth clients) with the
          # `auth_keys` write scope and the `tag:ci` tag. Unlike auth keys
          # (90-day max), OAuth clients don't expire, so nothing to rotate; the
          # action mints a short-lived ephemeral key per run.
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: gha-zed-nixcache

      - name: Build the nix package
        run: nix build .#default --no-link --print-out-paths > out-paths.txt

      - name: Push to najdorf's attic cache
        env:
          # Scoped, push-only token minted on najdorf with
          # `atticd-atticadm make-token --push main --pull main ...`.
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          # The cache is a tailnet-only Tailscale Service; the Tailscale step
          # above gives the runner reach to it over HTTPS.
          nix profile install nixpkgs#attic-client
          attic login najdorf "$ATTIC_ENDPOINT" "$ATTIC_TOKEN"
          attic push najdorf:main $(cat out-paths.txt)
